<!DOCTYPE html>
<html>
<head>
  <title>Solar AI Monitor | Smart Panel System</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 15px 20px;
      align-items: center;
    }

    h1 { color: #38bdf8; }

    .live {
      color: #22c55e;
      font-weight: bold;
    }

    .alert {
      display: none;
      background: #ef4444;
      padding: 10px;
      text-align: center;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(56,189,248,0.2);
      transition: 0.3s;
    }

    .card:hover { transform: scale(1.05); }

    .title { color: #94a3b8; }
    .value { font-size: 26px; font-weight: bold; }

    .status {
      text-align: center;
      padding: 10px;
      border-radius: 10px;
      font-size: 18px;
    }

    .normal { background: #22c55e; }
    .monitor { background: #facc15; color: black; }
    .clean { background: #ef4444; }

    canvas {
      background: #1e293b;
      border-radius: 15px;
      margin: 20px;
      padding: 10px;
    }

    .footer {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<div id="alertBox" class="alert">⚠ Cleaning Required Immediately</div>

<div class="header">
  <h1>☀ Solar AI Dashboard</h1>
  <div id="liveStatus" class="live">● Live</div>
</div>

<div class="container">
  <div class="card"><div class="title">Light</div><div class="value" id="light">--</div></div>
  <div class="card"><div class="title">Temperature</div><div class="value" id="temp">--</div></div>
  <div class="card"><div class="title">Humidity</div><div class="value" id="hum">--</div></div>
  <div class="card"><div class="title">Output</div><div class="value" id="output">--</div></div>
</div>

<div class="container">
  <div class="card">
    <div class="title">Status</div>
    <div id="statusBox" class="status">--</div>
  </div>

  <div class="card">
    <div class="title">Confidence</div>
    <div class="value" id="confidence">--</div>
  </div>

  <div class="card">
    <div class="title">Health Score</div>
    <div class="value" id="health">--</div>
  </div>
</div>

<div class="container">
  <div class="card">
    <div class="title">Reason</div>
    <div id="reason">--</div>
  </div>
</div>

<canvas id="outputChart"></canvas>
<canvas id="lightChart"></canvas>
<canvas id="perfChart"></canvas>

<div class="footer">
  Last Updated: <span id="time">--</span>
</div>

<script>

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBxSJVwGXypLCFU6usgZ5Ghdtur6E6IObE",
  databaseURL: "https://solar-intelligence-system-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// LIVE DATA
db.ref("solar_system/raw_data").limitToLast(1).on("value", snap => {
  const data = Object.values(snap.val())[0];

  document.getElementById("light").innerText = data.light.toFixed(2);
  document.getElementById("temp").innerText = data.temp + "°C";
  document.getElementById("hum").innerText = data.humidity + "%";
  document.getElementById("output").innerText = data.output.toFixed(2);

  document.getElementById("time").innerText = new Date().toLocaleTimeString();
});

// AI DATA
db.ref("solar_system/intelligence").on("value", snap => {
  const d = snap.val();
  const statusBox = document.getElementById("statusBox");

  document.getElementById("confidence").innerText = d.confidence;
  document.getElementById("reason").innerText = d.reason;

  let health = Math.max(0, 100 - d.drop_percentage);
  document.getElementById("health").innerText = health.toFixed(0) + "%";

  statusBox.className = "status";

  if (d.status.includes("NORMAL")) {
    statusBox.innerHTML = "🟢 NORMAL";
    statusBox.classList.add("normal");
    document.getElementById("alertBox").style.display = "none";
  } 
  else if (d.status.includes("MONITOR")) {
    statusBox.innerHTML = "🟡 MONITOR";
    statusBox.classList.add("monitor");
    document.getElementById("alertBox").style.display = "none";
  } 
  else {
    statusBox.innerHTML = "🔴 CLEAN";
    statusBox.classList.add("clean");
    document.getElementById("alertBox").style.display = "block";
  }
});

// OUTPUT CHART
let outputChart = new Chart(document.getElementById("outputChart"), {
  type: "line",
  data: { labels: [], datasets: [{ label: "Output", data: [], borderColor: "#38bdf8" }] }
});

// LIGHT CHART
let lightChart = new Chart(document.getElementById("lightChart"), {
  type: "line",
  data: { labels: [], datasets: [{ label: "Light", data: [], borderColor: "yellow" }] }
});

// PERFORMANCE CHART
let perfChart = new Chart(document.getElementById("perfChart"), {
  type: "line",
  data: { labels: [], datasets: [{ label: "Performance", data: [], borderColor: "orange" }] }
});

// UPDATE GRAPHS
db.ref("solar_system/raw_data").limitToLast(20).on("value", snap => {
  let values = snap.val();
  let labels = [];
  let out = [];
  let light = [];

  Object.keys(values).forEach(key => {
    labels.push(key.substring(1,6));
    out.push(values[key].output);
    light.push(values[key].light);
  });

  outputChart.data.labels = labels;
  outputChart.data.datasets[0].data = out;
  outputChart.update();

  lightChart.data.labels = labels;
  lightChart.data.datasets[0].data = light;
  lightChart.update();
});

// PERFORMANCE GRAPH
db.ref("solar_system/daily_summary").on("value", snap => {
  let values = snap.val();
  let labels = [];
  let data = [];

  Object.keys(values).forEach(day => {
    let d = values[day];
    if (d.max_light != 0) {
      labels.push(day);
      data.push(d.max_output / d.max_light);
    }
  });

  perfChart.data.labels = labels;
  perfChart.data.datasets[0].data = data;
  perfChart.update();
});

// BLINKING LIVE DOT
setInterval(() => {
  const el = document.getElementById("liveStatus");
  el.style.opacity = (el.style.opacity == 0.5) ? 1 : 0.5;
}, 500);

</script>

</body>
</html>
