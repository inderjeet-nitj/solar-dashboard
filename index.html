<!DOCTYPE html>
<html>
<head>
  <title>Solar AI Monitor</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <style>
    body { margin:0; font-family:system-ui; background:#0b1220; color:#e5e7eb; }

    .header { display:flex; justify-content:space-between; padding:16px 24px; border-bottom:1px solid #1f2937; }

    .section { padding:15px 20px; border-top:1px solid #1f2937; }

    .section-title { font-size:12px; color:#9ca3af; margin-bottom:10px; }

    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; }

    .card { background:#111827; border:1px solid #1f2937; border-radius:8px; padding:14px; }

    .title { font-size:11px; color:#9ca3af; }
    .value { font-size:20px; font-weight:600; }

    .status { text-align:center; padding:6px; border-radius:5px; }

    .normal { background:#064e3b; }
    .monitor { background:#78350f; }
    .clean { background:#7f1d1d; }

    canvas { background:#111827; border:1px solid #1f2937; border-radius:8px; padding:10px; }

    .toggle button {
      background:#1f2937;
      border:none;
      padding:6px 10px;
      margin-right:5px;
      color:white;
      cursor:pointer;
      border-radius:5px;
    }

    .toggle button.active { background:#2563eb; }
  </style>
</head>

<body>

<div class="header">
  <h3>Solar AI Dashboard</h3>
  <div>● Live</div>
</div>

<!-- OVERVIEW -->
<div class="section">
  <div class="section-title">Overview</div>
  <div class="grid">
    <div class="card"><div class="title">Light</div><div class="value" id="light">--</div></div>
    <div class="card"><div class="title">Temp</div><div class="value" id="temp">--</div></div>
    <div class="card"><div class="title">Humidity</div><div class="value" id="hum">--</div></div>
    <div class="card"><div class="title">Output</div><div class="value" id="output">--</div></div>
  </div>
</div>

<!-- AI -->
<div class="section">
  <div class="section-title">AI Insights</div>
  <div class="grid">
    <div class="card"><div class="title">Status</div><div id="statusBox" class="status">--</div></div>
    <div class="card"><div class="title">Confidence</div><div class="value" id="confidence">--</div></div>
    <div class="card"><div class="title">Health</div><div class="value" id="health">--</div></div>
  </div>
</div>

<!-- ML -->
<div class="section">
  <div class="section-title">ML Intelligence</div>
  <div class="grid">
    <div class="card"><div class="title">Predicted Output</div><div class="value" id="predicted">--</div></div>
    <div class="card"><div class="title">Efficiency</div><div class="value" id="efficiency">--</div></div>
    <div class="card"><div class="title">Days to Clean</div><div class="value" id="days">--</div></div>
  </div>
</div>

<!-- GRAPH -->
<div class="section">
  <div class="section-title">Analytics</div>

  <div class="toggle">
    <button onclick="setMode('all')" class="active">All</button>
    <button onclick="setMode('output')">Output</button>
    <button onclick="setMode('light')">Light</button>
    <button onclick="setMode('performance')">Performance</button>
  </div>

  <canvas id="mainChart"></canvas>
</div>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBxSJVwGXypLCFU6usgZ5Ghdtur6E6IObE",
  databaseURL: "https://solar-intelligence-system-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// LIVE
db.ref("solar_system/raw_data").limitToLast(1).on("value", snap => {
  if (!snap.val()) return;
  const d = Object.values(snap.val())[0];

  light.innerText = d.light.toFixed(2);
  temp.innerText = d.temp + "°C";
  hum.innerText = d.humidity + "%";
  output.innerText = d.output.toFixed(2);
});

// AI + ML
db.ref("solar_system/intelligence").on("value", snap => {
  if (!snap.val()) return;
  const d = snap.val();

  confidence.innerText = d.confidence;
  health.innerText = (100 - d.drop_percentage).toFixed(0) + "%";

  predicted.innerText = d.predicted_output.toFixed(2);
  efficiency.innerText = (d.efficiency * 100).toFixed(1) + "%";
  days.innerText = d.days_to_clean;

  statusBox.className = "status";

  if (d.status.includes("NORMAL")) {
    statusBox.innerText = "NORMAL";
    statusBox.classList.add("normal");
  } else if (d.status.includes("MONITOR")) {
    statusBox.innerText = "MONITOR";
    statusBox.classList.add("monitor");
  } else {
    statusBox.innerText = "CLEAN";
    statusBox.classList.add("clean");
  }
});

// CHART
let chart = new Chart(document.getElementById("mainChart"), {
  type: "line",
  data: { labels: [], datasets: [] }
});

let mode = "all";
let rawData = {};
let dailyData = {};

function setMode(m) {
  mode = m;
  document.querySelectorAll(".toggle button").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  updateChart();
}

db.ref("solar_system/raw_data").limitToLast(20).on("value", snap => {
  if (!snap.val()) return;
  rawData = snap.val();
  updateChart();
});

db.ref("solar_system/daily_summary").on("value", snap => {
  if (!snap.val()) return;
  dailyData = snap.val();
  updateChart();
});

function updateChart() {
  let labels = [];
  let datasets = [];

  let outputData = [];
  let lightData = [];
  let perfData = [];

  Object.keys(rawData).forEach(k => {
    labels.push(k);
    outputData.push(rawData[k].output);
    lightData.push(rawData[k].light);
  });

  Object.keys(dailyData).sort().forEach(day => {
    let d = dailyData[day];
    if (d.max_light !== 0) {
      perfData.push(d.max_output / d.max_light);
    }
  });

  if (mode === "all" || mode === "output") {
    datasets.push({ label:"Output", data:outputData, borderColor:"#3b82f6" });
  }

  if (mode === "all" || mode === "light") {
    datasets.push({ label:"Light", data:lightData, borderColor:"#facc15" });
  }

  if (mode === "all" || mode === "performance") {
    datasets.push({ label:"Performance", data:perfData, borderColor:"#f97316" });
  }

  chart.data.labels = labels;
  chart.data.datasets = datasets;
  chart.update();
}

</script>

</body>
</html>
