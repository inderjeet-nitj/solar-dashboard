<!DOCTYPE html>
<html>
<head>
  <title>Solar AI Monitor</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui;
      background: #0b1220;
      color: #e5e7eb;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid #1f2937;
    }

    h1 { font-size: 20px; margin: 0; }

    .section-title {
      padding: 10px 20px;
      font-size: 14px;
      color: #9ca3af;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
      gap: 16px;
      padding: 0 20px 20px;
    }

    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: 16px;
    }

    .title { font-size: 12px; color: #9ca3af; }
    .value { font-size: 20px; margin-top: 5px; }

    .status {
      padding: 8px;
      border-radius: 6px;
      text-align: center;
    }

    .normal { background: #065f46; }
    .monitor { background: #92400e; }
    .clean { background: #7f1d1d; }

    canvas {
      margin: 10px 20px;
      max-height: 250px;
    }

    .alert {
      display: none;
      background: #dc2626;
      padding: 8px;
      text-align: center;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
      margin: 15px;
    }
  </style>
</head>

<body>

<div id="alertBox" class="alert">⚠ Cleaning Required</div>

<div class="header">
  <h1>Solar AI Dashboard</h1>
  <div id="liveStatus">● Live</div>
</div>

<div class="section-title">Overview</div>
<div class="grid">
  <div class="card"><div class="title">Light</div><div class="value" id="light">--</div></div>
  <div class="card"><div class="title">Temp</div><div class="value" id="temp">--</div></div>
  <div class="card"><div class="title">Humidity</div><div class="value" id="hum">--</div></div>
  <div class="card"><div class="title">Output</div><div class="value" id="output">--</div></div>
</div>

<div class="section-title">AI Insights</div>
<div class="grid">
  <div class="card"><div class="title">Status</div><div id="statusBox" class="status">--</div></div>
  <div class="card"><div class="title">Confidence</div><div class="value" id="confidence">--</div></div>
  <div class="card"><div class="title">Health</div><div class="value" id="health">--</div></div>
</div>

<div class="grid">
  <div class="card"><div class="title">Reason</div><div id="reason">--</div></div>
</div>

<div class="section-title">Analytics</div>
<canvas id="outputChart"></canvas>
<canvas id="lightChart"></canvas>
<canvas id="perfChart"></canvas>

<div class="footer">
  Updated: <span id="time">--</span>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBxSJVwGXypLCFU6usgZ5Ghdtur6E6IObE",
  databaseURL: "https://solar-intelligence-system-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// LIVE DATA
db.ref("solar_system/raw_data").limitToLast(1).on("value", snap => {
  if (!snap.val()) return;

  const d = Object.values(snap.val())[0];

  light.innerText = d.light.toFixed(2);
  temp.innerText = d.temp + "°C";
  hum.innerText = d.humidity + "%";
  output.innerText = d.output.toFixed(2);

  time.innerText = new Date().toLocaleTimeString();
});

// AI DATA
db.ref("solar_system/intelligence").on("value", snap => {
  if (!snap.val()) return;

  const d = snap.val();

  confidence.innerText = d.confidence;
  reason.innerText = d.reason;

  let healthVal = Math.max(0, 100 - d.drop_percentage);
  health.innerText = healthVal.toFixed(0) + "%";

  statusBox.className = "status";

  if (d.status.includes("NORMAL")) {
    statusBox.innerText = "NORMAL";
    statusBox.classList.add("normal");
    alertBox.style.display = "none";
  } 
  else if (d.status.includes("MONITOR")) {
    statusBox.innerText = "MONITOR";
    statusBox.classList.add("monitor");
    alertBox.style.display = "none";
  } 
  else {
    statusBox.innerText = "CLEAN REQUIRED";
    statusBox.classList.add("clean");
    alertBox.style.display = "block";
  }
});

// CHART CONFIG (CLEAN STYLE)
const chartOptions = {
  responsive: true,
  plugins: { legend: { display: false }},
  scales: {
    x: { display: false },
    y: { grid: { color: "#1f2937" } }
  }
};

let outputChart = new Chart(outputChart, {
  type: "line",
  data: { labels: [], datasets: [{ data: [], borderColor:"#3b82f6", tension:0.4 }] },
  options: chartOptions
});

let lightChart = new Chart(lightChart, {
  type: "line",
  data: { labels: [], datasets: [{ data: [], borderColor:"#facc15", tension:0.4 }] },
  options: chartOptions
});

let perfChart = new Chart(perfChart, {
  type: "line",
  data: { labels: [], datasets: [{ data: [], borderColor:"#f97316", tension:0.4 }] },
  options: chartOptions
});

// RAW DATA GRAPH
db.ref("solar_system/raw_data").limitToLast(20).on("value", snap => {
  if (!snap.val()) return;

  let vals = snap.val();
  let labels = [], out=[], light=[];

  Object.keys(vals).forEach(k=>{
    labels.push(k);
    out.push(vals[k].output);
    light.push(vals[k].light);
  });

  outputChart.data.labels = labels;
  outputChart.data.datasets[0].data = out;
  outputChart.update();

  lightChart.data.labels = labels;
  lightChart.data.datasets[0].data = light;
  lightChart.update();
});

// PERFORMANCE GRAPH
db.ref("solar_system/daily_summary").on("value", snap => {
  if (!snap.val()) return;

  let vals = snap.val();
  let labels=[], data=[];

  Object.keys(vals).sort().forEach(day=>{
    let d = vals[day];
    if (d.max_light!=0){
      labels.push(day);
      data.push(d.max_output/d.max_light);
    }
  });

  perfChart.data.labels = labels;
  perfChart.data.datasets[0].data = data;
  perfChart.update();
});

// BLINK
setInterval(()=>{
  let el=document.getElementById("liveStatus");
  el.style.opacity=el.style.opacity==0.5?1:0.5;
},500);

</script>

</body>
</html>
