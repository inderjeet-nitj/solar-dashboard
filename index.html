<!DOCTYPE html>
<html>
<head>
  <title>Solar AI Monitor</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto;
      background: #0b1220;
      color: #e5e7eb;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid #1f2937;
    }

    h1 {
      margin: 0;
      font-size: 20px;
    }

    .live {
      color: #22c55e;
      font-size: 14px;
    }

    .alert {
      display: none;
      background: #dc2626;
      padding: 10px;
      text-align: center;
      font-weight: 500;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      padding: 20px;
    }

    .card {
      background: #111827;
      border-radius: 10px;
      padding: 16px;
      border: 1px solid #1f2937;
    }

    .title {
      font-size: 12px;
      color: #9ca3af;
    }

    .value {
      font-size: 22px;
      margin-top: 6px;
    }

    .status {
      padding: 8px;
      border-radius: 6px;
      text-align: center;
      font-weight: 500;
    }

    .normal { background: #065f46; }
    .monitor { background: #92400e; }
    .clean { background: #7f1d1d; }

    canvas {
      margin: 10px 20px;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
      margin: 20px;
    }
  </style>
</head>

<body>

<div id="alertBox" class="alert">⚠ Cleaning Required</div>

<div class="header">
  <h1>Solar AI Dashboard</h1>
  <div id="liveStatus" class="live">● Live</div>
</div>

<div class="grid">
  <div class="card"><div class="title">Light</div><div class="value" id="light">Loading...</div></div>
  <div class="card"><div class="title">Temperature</div><div class="value" id="temp">Loading...</div></div>
  <div class="card"><div class="title">Humidity</div><div class="value" id="hum">Loading...</div></div>
  <div class="card"><div class="title">Output</div><div class="value" id="output">Loading...</div></div>
</div>

<div class="grid">
  <div class="card">
    <div class="title">Status</div>
    <div id="statusBox" class="status">Loading...</div>
  </div>

  <div class="card">
    <div class="title">Confidence</div>
    <div class="value" id="confidence">--</div>
  </div>

  <div class="card">
    <div class="title">Health</div>
    <div class="value" id="health">--</div>
  </div>
</div>

<div class="grid">
  <div class="card">
    <div class="title">Reason</div>
    <div id="reason">Loading...</div>
  </div>
</div>

<canvas id="outputChart"></canvas>
<canvas id="lightChart"></canvas>
<canvas id="perfChart"></canvas>

<div class="footer">
  Last updated: <span id="time">--</span>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBxSJVwGXypLCFU6usgZ5Ghdtur6E6IObE",
  databaseURL: "https://solar-intelligence-system-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// LIVE DATA
db.ref("solar_system/raw_data").limitToLast(1).on("value", snap => {
  if (!snap.val()) return;

  const data = Object.values(snap.val())[0];

  document.getElementById("light").innerText = data.light.toFixed(2);
  document.getElementById("temp").innerText = data.temp + "°C";
  document.getElementById("hum").innerText = data.humidity + "%";
  document.getElementById("output").innerText = data.output.toFixed(2);

  document.getElementById("time").innerText = new Date().toLocaleTimeString();
});

// AI DATA
db.ref("solar_system/intelligence").on("value", snap => {
  if (!snap.val()) return;

  const d = snap.val();
  const box = document.getElementById("statusBox");

  document.getElementById("confidence").innerText = d.confidence;
  document.getElementById("reason").innerText = d.reason;

  let health = Math.max(0, 100 - d.drop_percentage);
  document.getElementById("health").innerText = health.toFixed(0) + "%";

  box.className = "status";

  if (d.status.includes("NORMAL")) {
    box.innerText = "NORMAL";
    box.classList.add("normal");
    alertBox.style.display = "none";
  } 
  else if (d.status.includes("MONITOR")) {
    box.innerText = "MONITOR";
    box.classList.add("monitor");
    alertBox.style.display = "none";
  } 
  else {
    box.innerText = "CLEAN REQUIRED";
    box.classList.add("clean");
    alertBox.style.display = "block";
  }
});

// CHARTS
let outputChart = new Chart(document.getElementById("outputChart"), {
  type: "line",
  data: { labels: [], datasets: [{ label: "Output", data: [] }] }
});

let lightChart = new Chart(document.getElementById("lightChart"), {
  type: "line",
  data: { labels: [], datasets: [{ label: "Light", data: [] }] }
});

let perfChart = new Chart(document.getElementById("perfChart"), {
  type: "line",
  data: { labels: [], datasets: [{ label: "Performance", data: [] }] }
});

// RAW GRAPH
db.ref("solar_system/raw_data").limitToLast(20).on("value", snap => {
  if (!snap.val()) return;

  let values = snap.val();
  let labels = [];
  let out = [];
  let light = [];

  Object.keys(values).forEach(k => {
    labels.push(k.substring(1,6));
    out.push(values[k].output);
    light.push(values[k].light);
  });

  outputChart.data.labels = labels;
  outputChart.data.datasets[0].data = out;
  outputChart.update();

  lightChart.data.labels = labels;
  lightChart.data.datasets[0].data = light;
  lightChart.update();
});

// PERFORMANCE GRAPH
db.ref("solar_system/daily_summary").on("value", snap => {
  if (!snap.val()) return;

  let values = snap.val();
  let labels = [];
  let data = [];

  Object.keys(values).sort().forEach(day => {
    let d = values[day];
    if (d.max_light != 0) {
      labels.push(day);
      data.push(d.max_output / d.max_light);
    }
  });

  perfChart.data.labels = labels;
  perfChart.data.datasets[0].data = data;
  perfChart.update();
});

// BLINK
setInterval(() => {
  let el = document.getElementById("liveStatus");
  el.style.opacity = el.style.opacity == 0.5 ? 1 : 0.5;
}, 500);

</script>

</body>
</html>
